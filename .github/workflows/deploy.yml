name: Deploy to Server

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image (arm64)
        run: |
          docker buildx build \
            —platform linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest \
            —push \
            ./backend

      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 2222
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/gold-backend/
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose pull
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose up -d
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker logout
