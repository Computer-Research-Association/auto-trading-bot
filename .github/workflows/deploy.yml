name: Deploy to Server

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-front:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Build front page
        run: |
          cd ./frontend
          printf "VITE_API_BASE_URL=%s\n" "${{ secrets.VITE_API_BASE_URL }}" > .env
          npm ci
          npm install -D @types/node
          npm run build

      - name: Deploy frontend on server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/*"
          target: "~/www"
          strip_components: 2

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image (arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest \
            --push \
            ./backend

      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 2222
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/gold-backend/
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose pull
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose up -d
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker logout
