name: Deploy to Server
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs: 
  deploy:
    runs-on: ubuntu-latest
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4
        
      - name: Build and push Docker images
        run: |
          docker buildx build --platform linux/arm64 --load -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
          
      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 2222
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/gold_backend/
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose pull
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose up -d
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker logout
